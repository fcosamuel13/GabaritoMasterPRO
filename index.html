<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GabaritoMaster PRO - V99.5.1 Hyper-Fidelity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --brand-primary: #7c3aed; 
            --brand-bg: #f8fafc;    
            --text-main: #0f172a;   
            --glass: rgba(255, 255, 255, 0.75);
        }

        .dark-mode {
            --brand-bg: #020617;
            --text-main: #f1f5f9;
            --glass: rgba(15, 23, 42, 0.85);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--brand-bg); 
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
            min-height: 100vh;
        }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.1) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
        }

        .orb {
            position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3;
            animation: float 25s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(120px, 60px) scale(1.1); }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px -15px rgba(0, 0, 0, 0.15);
        }

        .loader-ring { 
            border: 5px solid rgba(124, 58, 237, 0.1); 
            border-top: 4px solid var(--brand-primary); 
            border-radius: 50%; 
            width: 50px; height: 50px; 
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 30px -8px rgba(124, 58, 237, 0.5); }

        .grid-item { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.06);
            cursor: pointer;
        }
        .dark-mode .grid-item { background: rgba(30, 41, 59, 0.7); border-color: rgba(255, 255, 255, 0.08); }

        .ans-red { background: #fee2e2 !important; color: #dc2626 !important; border-color: #fecaca !important; }
        .ans-yellow { background: #fef9c3 !important; color: #854d0e !important; border-color: #fef08a !important; }
        .ans-missing { background: #fff1f2 !important; color: #e11d48 !important; border: 2px dashed #fecdd3 !important; }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .glass-card { box-shadow: none !important; border: 1px solid #ddd !important; background: white !important; }
        }
    </style>
</head>
<body>
    <div class="bg-animate no-print">
        <div class="orb bg-violet-500 w-[500px] h-[500px] -top-40 -left-40"></div>
        <div class="orb bg-indigo-400 w-[600px] h-[600px] -bottom-60 -right-60"></div>
    </div>
    
    <div id="root" class="flex-1 flex flex-col min-h-screen"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gabaritomaster-pro';

        window.fb_db = db;
        window.fb_auth = auth;
        window.fb_appId = appId;
        window.fb_funcs = { collection, getDocs, signInAnonymously, signInWithCustomToken, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, Fragment, useEffect, useMemo } = React;

        const SVGIcon = ({ type, className = "" }) => {
            const icons = {
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>,
                check: <polyline points="20 6 9 17 4 12"/>,
                excel: <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M8 13h8 M8 17h8 M10 9h4"/>,
                lock: <Fragment><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Fragment>,
                user: <Fragment><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Fragment>,
                chart: <path d="M12 20V10M18 20V4M6 20v-4" />,
                refresh: <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8m0 0V3m0 5h-5m-9 7a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16m0 0v5m0-5h-5" />,
                logout: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />,
                sun: <Fragment><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></Fragment>,
                moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />,
                file: <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                history: <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[type] || null}
                </svg>
            );
        };

        const App = () => {
            const [fbUser, setFbUser] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [emailInput, setEmailInput] = useState("");
            const [authLoading, setAuthLoading] = useState(false);
            const [authError, setAuthError] = useState("");
            const [isDark, setIsDark] = useState(false);
            const [history, setHistory] = useState([]);

            const MASTER_EMAILS = [
                "fcosamuels@gmail.com", "ellen.deca@idaam.com.br", "leliane.supervisao@idaam.com.br",
                "renata.silva@idaam.com.br", "francisco.samuel@idaam.com.br", "mariana.azevedo@idaam.com.br",
                "flavia.martins@idaam.com.br", "celia.carra@idaam.com.br", "ioni.araujo@idaam.com.br"
            ];

            const [status, setStatus] = useState('idle'); 
            const [results, setResults] = useState([]); 
            const [hasMissing, setHasMissing] = useState(false);
            const [meta, setMeta] = useState({ tipo: "", serie: "", av: "", turno: "", fileName: "" });
            const [error, setError] = useState(null);
            const [logs, setLogs] = useState([]);
            const [copied, setCopied] = useState(false);

            const addLog = (msg) => setLogs(p => [...p, msg]);

            const stats = useMemo(() => {
                if (!results.length) return null;
                const counts = { A: 0, B: 0, C: 0, D: 0, E: 0, "?": 0 };
                results.forEach(r => { if (counts.hasOwnProperty(r.letter)) counts[r.letter]++; });
                return counts;
            }, [results]);

            useEffect(() => {
                if (isDark) document.body.classList.add('dark-mode');
                else document.body.classList.remove('dark-mode');
            }, [isDark]);

            useEffect(() => {
                const checkInterval = setInterval(async () => {
                    if (window.fb_auth && window.fb_funcs) {
                        clearInterval(checkInterval);
                        const { fb_auth, fb_funcs } = window;
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await fb_funcs.signInWithCustomToken(fb_auth, __initial_auth_token);
                            } else {
                                await fb_funcs.signInAnonymously(fb_auth);
                            }
                            fb_funcs.onAuthStateChanged(fb_auth, (user) => setFbUser(user));
                        } catch (e) {}
                    }
                }, 500);
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                const input = emailInput.toLowerCase().trim();
                setAuthLoading(true); setAuthError("");
                if (MASTER_EMAILS.includes(input)) { setIsAuthenticated(true); setAuthLoading(false); return; }
                try {
                    const { fb_db, fb_appId, fb_funcs } = window;
                    const collRef = fb_funcs.collection(fb_db, 'artifacts', fb_appId, 'public', 'data', 'authorized_users');
                    const snapshot = await fb_funcs.getDocs(collRef);
                    const authorizedEmails = snapshot.docs.map(doc => doc.data().email.toLowerCase().trim());
                    if (authorizedEmails.includes(input)) setIsAuthenticated(true);
                    else setAuthError("Acesso negado: E-mail não autorizado.");
                } catch (err) { setAuthError("Erro de ligação ao servidor."); } finally { setAuthLoading(false); }
            };

            const isRedColor = (hex) => {
                if (!hex) return false;
                const h = hex.toUpperCase().replace('#', '');
                return ["FF0000", "C00000", "ED1C24", "FE0000", "FF5050", "990000", "ED1B24", "FF0001", "ED1C23", "FF3333", "E30613"].includes(h);
            };

            // MOTOR TITANIUM-SCAN V99.5.1 (PRECISÃO CROMÁTICA REFORÇADA)
            const processFile = async (file) => {
                if (!file) return;
                setStatus('processing'); setLogs([]); setResults([]); setHasMissing(false); setError(null);
                addLog(`Iniciando Titanium Hyper-Fidelity V99.5.1: ${file.name}`);
                
                const metaExtractor = (text) => {
                    const upper = text.toUpperCase();
                    let info = {};
                    const serieMatch = upper.match(/(\d{1,2})\s?[ºª°]?\s?(ANO|SERIE|SÉRIE)/);
                    if (serieMatch) info.serie = serieMatch[0];
                    const avMatch = upper.match(/AV\s?(\d{1,2})/);
                    if (avMatch) info.av = avMatch[0];
                    if (upper.match(/\b(T1|TIPO\s?0?1)\b/)) info.tipo = "TIPO 01";
                    else if (upper.match(/\b(T2|TIPO\s?0?2)\b/)) info.tipo = "TIPO 02";
                    const turnoMatch = upper.match(/\b(MATUTINO|VESPERTINO|NOTURNO|MANHA|MANHÃ|TARDE|NOITE)\b/);
                    if (turnoMatch) {
                        const t = turnoMatch[0];
                        if (t === "MANHA" || t === "MANHÃ") info.turno = "MATUTINO";
                        else if (t === "TARDE") info.turno = "VESPERTINO";
                        else if (t === "NOITE") info.turno = "NOTURNO";
                        else info.turno = t;
                    }
                    return info;
                };

                try {
                    const zip = await JSZip.loadAsync(await file.arrayBuffer());
                    const docXml = await zip.file("word/document.xml").async("string");
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(docXml, "text/xml");
                    const paragraphs = Array.from(xmlDoc.getElementsByTagName("w:p"));
                    
                    let questionMap = new Map(); 
                    let currentQuestID = 0;
                    let metaUpdate = { ...metaExtractor(file.name), fileName: file.name };

                    for (let i = 0; i < paragraphs.length; i++) {
                        const p = paragraphs[i];
                        const runs = Array.from(p.getElementsByTagName("w:r"));
                        
                        const pText = runs.map(r => r.getElementsByTagName("w:t")[0]?.textContent || "").join("");
                        const cleanPText = pText.trim();
                        if (!cleanPText) continue;

                        // 1. ÂNCORA LASER (Quantitativo Seguro)
                        const anchorMatch = cleanPText.match(/^(?:\s*|Questão\s+|Q\s*)(\d{1,3})\s*[\.\-\)\:]/i);
                        if (anchorMatch) {
                            currentQuestID = parseInt(anchorMatch[1]);
                        } else if (cleanPText.match(/^(\d{1,3})\s*[\.\-\)\:]/)) {
                            currentQuestID = parseInt(cleanPText.match(/^(\d{1,3})/)[0]);
                        }

                        // 2. METADADOS
                        if (i < 200) {
                            const cm = metaExtractor(cleanPText);
                            if (!metaUpdate.serie && cm.serie) metaUpdate.serie = cm.serie;
                            if (!metaUpdate.av && cm.av) metaUpdate.av = cm.av;
                            if (!metaUpdate.tipo && cm.tipo) metaUpdate.tipo = cm.tipo;
                            if (!metaUpdate.turno && cm.turno) metaUpdate.turno = cm.turno;
                        }

                        // 3. VARREDURA HYPER-FIDELITY (Filtro Anti-"?")
                        // Agora percorremos todos os runs e acumulamos candidatos se houver cor
                        for (let r of runs) {
                            const highlight = r.getElementsByTagName("w:highlight")[0]?.getAttribute("w:val");
                            const colorNode = r.getElementsByTagName("w:color")[0];
                            const colorVal = colorNode ? colorNode.getAttribute("w:val") : null;
                            const tContentRaw = (r.getElementsByTagName("w:t")[0]?.textContent || "").trim();

                            if (highlight === "yellow" || isRedColor(colorVal)) {
                                // Se o fragmento tem cor, procuramos a LETRA nele. 
                                // Não paramos apenas porque o fragmento pode ser um símbolo "=" ou "("
                                const matchLetra = tContentRaw.match(/[A-Ea-e]/);
                                if (matchLetra) {
                                    const letter = matchLetra[0].toUpperCase();
                                    let targetID = (currentQuestID > 0) ? currentQuestID : (questionMap.size > 0 ? Math.max(...questionMap.keys()) + 1 : 1);
                                    
                                    if (!questionMap.has(targetID)) {
                                        questionMap.set(targetID, {
                                            id: targetID,
                                            letter: letter,
                                            type: (highlight === "yellow" ? "yellow" : "red")
                                        });
                                        // Achamos a resposta da questão atual, podemos avançar para o próximo parágrafo
                                        break; 
                                    }
                                }
                                // Se o fragmento tem cor mas NÃO tem letra, continuamos a ver os outros runs do parágrafo
                            }
                        }
                    }

                    if (questionMap.size === 0) {
                        setError("O sistema não detetou marcações cromáticas.");
                        setStatus('idle'); return;
                    }

                    const sortedIDs = Array.from(questionMap.keys()).sort((a,b) => a-b);
                    const lastNumFound = Math.max(...sortedIDs);
                    let finalResults = []; let gaps = false;
                    
                    for (let i = 1; i <= lastNumFound; i++) {
                        if (questionMap.has(i)) {
                            finalResults.push(questionMap.get(i));
                        } else {
                            finalResults.push({ id: i, letter: "?", type: "missing" });
                            gaps = true;
                        }
                    }

                    const extractData = { meta: metaUpdate, results: finalResults, hasMissing: gaps };
                    setMeta(metaUpdate); setResults(finalResults); setHasMissing(gaps); setStatus('done');
                    setHistory(prev => [{...extractData, time: new Date().toLocaleTimeString()}, ...prev.filter(h => h.meta.fileName !== file.name).slice(0, 9)]);

                } catch (e) { setError("Erro ao ler o ficheiro Word."); setStatus('error'); }
            };

            const restoreExtraction = (h) => { setMeta(h.meta); setResults(h.results); setHasMissing(h.hasMissing); setStatus('done'); };

            const toggleLetter = (id) => {
                const letters = ["A", "B", "C", "D", "E", "?"];
                setResults(prev => prev.map(item => {
                    if (item.id === id) {
                        const nextIdx = (letters.indexOf(item.letter) + 1) % letters.length;
                        return { ...item, letter: letters[nextIdx], type: letters[nextIdx] === "?" ? "missing" : "yellow" };
                    }
                    return item;
                }));
            };

            const copyExcel = () => {
                let out = `GabaritoMaster PRO - Extração Titanium V84\nCRIADO POR: FRANCISCO SAMUEL DA SILVA LEMOS\n`;
                out += `SÉRIE:\t${meta.serie || '---'}\nAVALIAÇÃO:\t${meta.av || '---'}\nTIPO:\t${meta.tipo || '---'}\nTURNO:\t${meta.turno || '---'}\n--------------------------\n`;
                results.forEach(it => { out += `${it.id}\t${it.letter}\n`; });
                const textArea = document.createElement("textarea"); textArea.value = out; document.body.appendChild(textArea); textArea.select();
                document.execCommand('copy'); document.body.removeChild(textArea);
                setCopied(true); setTimeout(() => setCopied(false), 2000);
            };

            if (!isAuthenticated) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-6 fade-in min-h-screen relative z-10 font-black">
                        <div className="glass-card max-w-md w-full p-10 text-center relative overflow-hidden border-2 border-white/50 dark:border-white/5 shadow-2xl font-black">
                            <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-violet-500 via-fuchsia-500 to-indigo-600"></div>
                            <div className="flex justify-end mb-4">
                                <button onClick={() => setIsDark(!isDark)} className="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-yellow-400 hover:scale-110 transition-all border border-slate-200 dark:border-slate-700 shadow-sm">
                                    <SVGIcon type={isDark ? "sun" : "moon"} className="w-5 h-5" />
                                </button>
                            </div>
                            <div className="bg-violet-50 dark:bg-violet-900/20 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-inner border border-violet-100 dark:border-violet-800/30 text-violet-600 dark:text-violet-400 font-black"><SVGIcon type="shield" className="w-10 h-10 font-black" /></div>
                            <h1 className="text-3xl font-black tracking-tighter italic text-slate-800 dark:text-white mb-2 uppercase font-black font-black">GabaritoMaster<span className="text-violet-600 ml-1">PRO</span></h1>
                            <p className="text-slate-500 dark:text-slate-400 text-sm font-medium mb-10 leading-relaxed px-4 italic text-center font-black">Unidade segura para processamento de gabaritos oficiais.</p>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div className="relative group font-black">
                                    <div className="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none group-focus-within:text-violet-600 text-slate-400 transition-colors font-black"><SVGIcon type="user" className="w-5 h-5 font-black" /></div>
                                    <input type="email" required placeholder="Seu e-mail institucional" className="w-full pl-14 pr-5 py-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 outline-none focus:border-violet-500 focus:ring-8 focus:ring-violet-500/5 transition-all font-semibold text-slate-700 dark:text-slate-200 font-black" value={emailInput} onChange={(e) => setEmailInput(e.target.value)} />
                                </div>
                                {authError && <p className="text-rose-600 text-xs font-bold flex items-center justify-center gap-2 animate-pulse bg-rose-50 dark:bg-rose-900/10 p-3 rounded-xl border border-rose-100 dark:border-rose-900/20 font-black"><SVGIcon type="alert" className="w-4 h-4 font-black" /> {authError}</p>}
                                <button type="submit" disabled={authLoading} className="btn-primary w-full py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl flex items-center justify-center gap-3">{authLoading ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : "Entrar no Sistema"}</button>
                            </form>
                            <p className="mt-12 text-[10px] text-slate-400 dark:text-slate-505 font-bold uppercase tracking-widest leading-loose text-center font-black">V99.5.1 Final • Desenvolvido por <br/> Francisco Samuel da Silva Lemos</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-6 py-10 flex-1 flex flex-col md:flex-row gap-10 relative z-10 w-full font-black">
                    {/* SIDEBAR */}
                    <aside className="w-full md:w-72 no-print flex flex-col gap-6 fade-in font-black">
                        <div className="glass-card p-6 flex flex-col gap-6 h-fit sticky top-10 border-2 border-white/40 dark:border-white/5 shadow-xl font-black">
                            <div className="flex justify-between items-center font-black">
                                <div className="flex items-center gap-2 text-slate-500 dark:text-slate-400 font-black">
                                    <div className="bg-violet-600 w-2 h-6 rounded-full shadow-[0_0_10px_rgba(124,58,237,0.4)]"></div>
                                    <h4 className="font-black text-[10px] uppercase tracking-[0.2em] font-black">Painel Principal</h4>
                                </div>
                                <button onClick={() => setIsDark(!isDark)} className="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-yellow-400 hover:scale-110 transition-all border border-slate-200 dark:border-slate-700 shadow-sm font-black">
                                    <SVGIcon type={isDark ? "sun" : "moon"} className="w-4 h-4 font-black" />
                                </button>
                            </div>
                            
                            <div className="space-y-4 font-black">
                                <h5 className="flex items-center gap-2 font-bold text-xs text-slate-700 dark:text-slate-200 italic font-black"><SVGIcon type="history" className="w-4 h-4 text-violet-500 font-black" /> Histórico Recente</h5>
                                {history.length === 0 ? (
                                    <div className="p-8 text-center bg-slate-50/50 dark:bg-slate-900/30 rounded-2xl border border-dashed border-slate-200 dark:border-slate-800 text-slate-400 text-center font-black">
                                        <p className="text-[10px] leading-relaxed uppercase font-black text-center font-black">Vazio</p>
                                    </div>
                                ) : (
                                    <div className="flex flex-col gap-3 font-black">
                                        {history.map((item, idx) => (
                                            <div key={idx} onClick={() => restoreExtraction(item)} className={`history-item p-4 rounded-2xl bg-white/50 dark:bg-slate-800/40 shadow-sm border transition-all ${meta.fileName === item.meta.fileName ? 'border-violet-500 bg-violet-50/30 dark:bg-violet-900/20 shadow-violet-500/10 font-black' : 'border-slate-100 dark:border-slate-800 font-black'}`}>
                                                <div className="flex items-center gap-3 mb-2 text-slate-800 dark:text-slate-200 font-black">
                                                    <SVGIcon type="file" className="w-3.5 h-3.5 text-violet-600 font-black" />
                                                    <p className="text-[11px] font-black truncate font-black tracking-tight">{item.meta.fileName}</p>
                                                </div>
                                                <div className="flex justify-between items-center text-[9px] font-bold uppercase tracking-tighter text-slate-500 dark:text-slate-400 font-black">
                                                    <span className="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 rounded-md font-black">{item.results.length} Itens</span>
                                                    <span className="font-black">{item.time}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <button onClick={() => setIsAuthenticated(false)} className="mt-4 text-[10px] text-slate-400 hover:text-rose-500 font-black uppercase tracking-[0.3em] transition-all flex items-center justify-center gap-3 px-4 py-4 hover:bg-rose-50 dark:hover:bg-rose-900/10 rounded-2xl border border-transparent hover:border-rose-100 dark:hover:border-rose-900/20 font-black"><SVGIcon type="logout" className="w-4 h-4 font-black" /> Encerrar Sistema</button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col gap-8 min-w-0 font-black">
                        <header className="text-center md:text-left mb-4 fade-in font-black">
                            <h1 className="text-5xl font-black tracking-tighter italic gradient-text leading-tight mb-2 text-slate-800 dark:text-white text-center md:text-left font-black">GabaritoMaster<span className="text-violet-600 ml-2 font-black">PRO</span></h1>
                            <div className="flex items-center gap-3 justify-center md:justify-start font-black">
                                <span className="text-slate-400 dark:text-slate-500 text-[10px] font-black uppercase tracking-[0.5em] font-black">V99.5.1 Hyper-Fidelity</span>
                                <div className="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981] font-black"></div>
                                <span className="text-slate-500 dark:text-slate-400 text-[10px] font-black uppercase tracking-[0.5em] font-black">Titanium Active</span>
                            </div>
                        </header>

                        {status === 'idle' && (
                            <div className="space-y-8 animate-in fade-in zoom-in-95 duration-700 font-black">
                                <div className="glass-card p-10 border-2 border-dashed border-slate-200 dark:border-slate-700 group hover:border-violet-400 hover:bg-violet-50/10 dark:hover:bg-violet-900/5 transition-all cursor-pointer relative overflow-hidden min-h-[350px] flex items-center justify-center shadow-xl font-black">
                                    <label className="flex flex-col items-center justify-center h-full cursor-pointer w-full text-center font-black">
                                        <div className="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl mb-8 group-hover:scale-110 group-hover:rotate-6 transition-all duration-500 ring-8 ring-violet-500/5 dark:ring-violet-400/5 font-black">
                                            <SVGIcon type="upload" className="w-14 h-14 text-violet-600 dark:text-violet-400 font-black" />
                                        </div>
                                        <h2 className="text-3xl font-black tracking-tight mb-3 uppercase text-slate-800 dark:text-white font-black">Analisar Ficheiro .docx</h2>
                                        <p className="text-slate-400 dark:text-slate-500 font-bold italic text-[11px] px-12 uppercase tracking-[0.2em] leading-relaxed font-black">Extração cravada dos 70 itens com o motor Titanium Legend</p>
                                        <input type="file" className="hidden" accept=".docx" onChange={(e) => processFile(e.target.files[0])} />
                                    </label>
                                </div>
                            </div>
                        )}

                        {status === 'processing' && (
                            <div className="glass-card p-16 text-center animate-in zoom-in-95 border-2 border-white/50 dark:border-white/5 shadow-2xl font-black font-black">
                                <div className="flex flex-col items-center mb-10 text-violet-600 dark:text-violet-400 font-black">
                                    <div className="loader-ring mb-8 font-black"></div>
                                    <h2 className="text-2xl font-black uppercase tracking-[0.4em] animate-pulse font-black">Sincronizando</h2>
                                    <p className="text-slate-400 dark:text-slate-505 text-[10px] font-black mt-3 uppercase tracking-[0.2em] font-black">Filtro cirúrgico de respostas para eliminar interrogações</p>
                                </div>
                                <div className="bg-white/50 dark:bg-slate-900/60 p-6 rounded-3xl border border-black/5 dark:border-white/5 text-left max-w-xl mx-auto shadow-inner overflow-hidden text-slate-500 dark:text-slate-400 font-mono text-[10px] font-black">
                                    {logs.map((l, i) => <div key={i} className="mb-1.5 opacity-80 whitespace-nowrap font-black">> {l}</div>)}
                                    <div className="w-2 h-4 bg-violet-400 animate-pulse inline-block align-middle ml-1 font-black"></div>
                                </div>
                            </div>
                        )}

                        {status === 'done' && (
                            <div className="fade-in space-y-8 pb-20 font-black">
                                <div className="glass-card p-8 border-l-8 border-violet-600 border-2 border-white/50 dark:border-white/5 text-slate-800 dark:text-white shadow-xl font-black">
                                    <div className="flex flex-col sm:flex-row justify-between items-start gap-4 mb-10 font-black">
                                        <div className="min-w-0 font-black">
                                            <p className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1 italic font-black">Arquivo Selecionado</p>
                                            <h3 className="text-2xl font-black truncate pr-4 uppercase tracking-tighter text-left font-black font-black">{meta.fileName}</h3>
                                        </div>
                                        <div className="stat-badge whitespace-nowrap bg-emerald-50 dark:bg-emerald-900/10 text-emerald-600 dark:text-emerald-400 border-emerald-100 dark:border-emerald-800/30 shadow-sm font-black">
                                            <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981] font-black"></div>
                                            {results.length} Itens Localizados
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-10 font-black">
                                        {[
                                            {label: 'Série / Ano', val: meta.serie},
                                            {label: 'Avaliação', val: meta.av, color: 'text-violet-600 dark:text-violet-400'},
                                            {label: 'Tipo', val: meta.tipo},
                                            {label: 'Turno', val: meta.turno, color: 'text-emerald-600 dark:text-emerald-400'}
                                        ].map((item, i) => (
                                            <div key={i} className="space-y-2 font-black">
                                                <span className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] font-black font-black">{item.label}</span>
                                                <p className={`font-black text-lg sm:text-xl uppercase truncate ${item.color || 'text-slate-800 dark:text-slate-200'} font-black`}>{item.val || "---"}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {hasMissing && (
                                    <div className="glass-card p-5 border-l-8 border-rose-500 bg-rose-50/30 dark:bg-rose-900/10 flex gap-5 items-center no-print border-2 border-white/50 dark:border-white/5 animate-pulse text-slate-800 dark:text-white shadow-lg font-black">
                                        <div className="bg-rose-500 p-2.5 rounded-2xl text-white shadow-lg shadow-rose-200 dark:shadow-none font-black"><SVGIcon type="info" className="w-6 h-6 font-black" /></div>
                                        <div className="text-left text-slate-800 dark:text-white font-black font-black">
                                            <h4 className="font-black dark:text-rose-400 uppercase text-[11px] tracking-[0.1em] mb-0.5 italic font-black">Atenção ao Gabarito</h4>
                                            <p className="text-slate-600 dark:text-slate-400 text-xs font-bold leading-relaxed underline font-black">Alguns itens com (!) não foram localizados por cor. Clique para correção manual.</p>
                                        </div>
                                    </div>
                                )}

                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 px-2 no-print font-black font-black">
                                    <button onClick={() => setStatus('idle')} className="btn-secondary px-8 py-4 rounded-2xl font-black flex items-center gap-4 group text-slate-500 dark:text-slate-400 hover:text-rose-500 dark:hover:text-rose-400 shadow-sm transition-all font-black"><SVGIcon type="refresh" className="w-5 h-5 group-hover:rotate-180 transition-transform duration-700 font-black" /><span className="uppercase tracking-widest text-[11px] font-black">Nova Extração</span></button>
                                    <button onClick={copyExcel} className="btn-primary px-12 py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-6 shadow-2xl hover:scale-[1.03] active:scale-95 transition-all shadow-violet-500/20 font-black"><SVGIcon type={copied ? "check" : "excel"} className="w-6 h-6 text-white font-black" />{copied ? "DADOS COPIADOS!" : "COPIAR PARA EXCEL"}</button>
                                </div>

                                <div className="glass-card p-10 shadow-2xl border-2 border-white/50 dark:border-white/5 bg-white/90 dark:bg-slate-900/80 font-black">
                                    <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 gap-x-8 gap-y-12 font-black">
                                        {results.map((it, i) => (
                                            <div key={i} className="text-center group font-black" onClick={() => toggleLetter(it.id)}>
                                                <span className="text-[10px] font-black text-slate-400 dark:text-slate-505 uppercase block mb-3 transition-colors group-hover:text-violet-600 italic tracking-tighter font-black">Q{it.id < 10 ? '0'+it.id : it.id}</span>
                                                <div className={`w-14 h-14 mx-auto flex items-center justify-center rounded-[1.5rem] font-black text-3xl border-2 grid-item shadow-sm transition-all duration-300 ${
                                                    it.type === 'red' ? 'ans-red' : it.type === 'missing' ? 'ans-missing' : it.type === 'yellow' ? 'ans-yellow' : 'text-slate-800 dark:text-white'
                                                } font-black font-black`}>{it.letter}</div>
                                                <div className="opacity-0 group-hover:opacity-100 transition-opacity mt-2 no-print flex justify-center text-slate-300 dark:text-slate-600 font-black"><SVGIcon type="edit" className="w-4 h-4 font-black" /></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="glass-card p-10 bg-white/60 dark:bg-slate-900/40 border-t-8 border-violet-500/20 border-2 border-white/50 dark:border-white/5 text-slate-800 dark:text-white shadow-lg font-black font-black">
                                    <div className="flex items-center gap-4 mb-10 text-slate-800 dark:text-white font-black">
                                        <div className="bg-violet-600 p-2.5 rounded-2xl text-white shadow-lg shadow-violet-200 dark:shadow-none font-black"><SVGIcon type="chart" className="w-6 h-6 font-black" /></div>
                                        <div className="text-left text-slate-800 dark:text-white font-black font-black">
                                            <h4 className="font-black uppercase text-xs tracking-[0.2em] font-black font-black font-black">Distribuição de Alternativas</h4>
                                            <p className="text-slate-400 dark:text-slate-505 text-[10px] font-black uppercase tracking-widest mt-0.5 font-black">Visão estatística para equilíbrio de prova</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-5 gap-10 font-black font-black">
                                        {['A', 'B', 'C', 'D', 'E'].map(l => (
                                            <div key={l} className="space-y-4 font-black">
                                                <div className="flex justify-between items-end border-b border-slate-100 dark:border-slate-800 pb-2 text-slate-800 dark:text-slate-200 font-black">
                                                    <span className="font-black text-2xl font-black">{l}</span>
                                                    <span className="text-[11px] font-black text-violet-600 dark:text-violet-400 uppercase tracking-widest bg-violet-50 dark:bg-violet-900/20 px-2.5 py-1 rounded-lg font-black font-black">{stats[l] || 0} Itens</span>
                                                </div>
                                                <div className="progress-bar font-black font-black"><div className="progress-fill font-black" style={{ width: `${((stats[l] || 0) / (results.length || 1)) * 100}%` }}></div></div>
                                                <p className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase text-right tracking-[0.1em] font-black font-black">{(((stats[l] || 0) / (results.length || 1)) * 100).toFixed(1)}% do simulado</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
